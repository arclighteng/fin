[project]
name = "finproj"
version = "0.1.0"
description = "Local-first finance MVP (SimpleFin + subscriptions/anomalies)"
requires-python = ">=3.12"
dependencies = [
  "typer>=0.12.0",
  "httpx>=0.27.0",
  "pydantic>=2.7.0",
  "python-dateutil>=2.9.0",
  "rich>=13.7.0",
]

[project.scripts]
fin = "fin.cli:app"

[tool.pytest.ini_options]
testpaths = ["tests"]
